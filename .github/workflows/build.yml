name: Build PayURLHook Tweak

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  THEOS: /Users/runner/theos

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install ldid
      run: brew install ldid

    - name: Clone Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $THEOS
        echo "Theos cloned to $THEOS"

    - name: Download iOS SDKs
      run: |
        curl -sL https://github.com/theos/sdks/archive/master.tar.gz | tar -xz
        mv sdks-master/*.sdk $THEOS/sdks/
        rm -rf sdks-master
        echo "Available SDKs:"
        ls $THEOS/sdks/

    - name: Build deb package
      run: make package FINALPACKAGE=1

    - name: Upload deb
      uses: actions/upload-artifact@v4
      with:
        name: PayURLHook-deb
        path: packages/*.deb
